services:
  frontend-reactjs:
    image: node:18-alpine
    working_dir: /app
    container_name: frontend-reactjs
    volumes:
      - /home/ec2-user/Frontend_todo:/app
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://REPLACE_IP:7081
    command: sh -c "npm install && npm start"

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"

  backend-springboot:
    image: eclipse-temurin:17-jre
    container_name: backend-springboot
    restart: always
    depends_on:
      - mysql
    ports:
      - "7081:7081"
    volumes:
      - ./code/backend.jar:/app/code.jar
    working_dir: /app
    #command: ["sleep", "infinity"]
    command: ["java", "-jar", "code.jar"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/appdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
